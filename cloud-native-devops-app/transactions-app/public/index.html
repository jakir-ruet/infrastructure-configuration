<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Transactions</title>

    <!-- Bootstrap 5.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">💰 Transactions Manager</h1>

    <!-- Form Card -->
    <div class="card shadow mb-4">
        <div class="card-body">
            <h5 class="card-title">Add / Edit Transaction</h5>

            <!-- Hidden ID for internal use -->
            <input id="id" type="hidden">

            <div class="row g-3">
                <div class="col-md-4">
                    <input id="amount" class="form-control" placeholder="Amount">
                </div>
                <div class="col-md-6">
                    <input id="desc" class="form-control" placeholder="Description">
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" onclick="save()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="card shadow">
        <div class="card-body">
            <h5 class="card-title">All Transactions</h5>

            <div class="table-responsive">
                <table class="table table-bordered table-striped table-hover align-middle" id="tbl">
                    <thead class="table-dark">
                        <tr>
                            <th>SL</th>
                            <th>Amount</th>
                            <th>Description</th>
                            <th width="150">Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
async function load(){
    const res = await fetch('/api/transactions');
    const data = await res.json();

    const tbody = document.querySelector('#tbl tbody');
    tbody.innerHTML = '';

    // Use index + 1 as Serial Number
    data.forEach((t, index) => {
        tbody.innerHTML += `
        <tr>
            <td>${index + 1}</td>
            <td class="fw-bold text-success">$${t.amount}</td>
            <td>${t.description}</td>
            <td>
                <button class="btn btn-sm btn-warning me-1"
                    onclick="edit(${t.id}, ${t.amount}, \`${t.description}\`)">
                    Edit
                </button>
                <button class="btn btn-sm btn-danger"
                    onclick="del(${t.id})">
                    Delete
                </button>
            </td>
        </tr>`;
    });
}

function edit(id, amount, description){
    document.getElementById('id').value = id;
    document.getElementById('amount').value = amount;
    document.getElementById('desc').value = description;
}

async function del(id){
    if(confirm('Are you sure you want to delete?')){
        await fetch('/api/transactions/' + id, { method: 'DELETE' });
        load();
    }
}

async function save(){
    const id = document.getElementById('id').value;

    const body = JSON.stringify({
        amount: document.getElementById('amount').value,
        description: document.getElementById('desc').value
    });

    if(id){
        await fetch('/api/transactions/' + id, {
            method: 'PUT',
            headers: {'Content-Type':'application/json'},
            body
        });
    } else {
        await fetch('/api/transactions', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body
        });
    }

    // Reset form
    document.getElementById('id').value = '';
    document.getElementById('amount').value = '';
    document.getElementById('desc').value = '';

    load();
}

// Initial load
load();
</script>

</body>
</html>
