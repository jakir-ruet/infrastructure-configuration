# Configuration directory and pgbouncer.ini
# /etc/pgbouncer/pgbouncer.ini
# /etc/pgbouncer/userlist.txt

[databases]
postgres = host=127.0.0.1 port=5432 dbname=postgres

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction       # Use transaction pooling
max_client_conn = 1000
default_pool_size = 50
reserve_pool_size = 20
log_connections = 1
log_disconnections = 1

# -----------------------------
# Connection tuning
# -----------------------------
tcp_keepalive = 1              # Enable TCP keepalive to detect dead connections
server_idle_timeout = 600      # Close idle server connections after 10 minutes
