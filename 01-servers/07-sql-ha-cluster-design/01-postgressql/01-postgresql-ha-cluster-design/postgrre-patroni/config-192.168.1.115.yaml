# Cluster name (all nodes must use same scope)
scope: postgres

# Namespace in etcd (logical path for keys)
namespace: /db/

# Unique node name (must be different on each node)
name: postgres2

restapi:
  # Patroni REST API listen address (used by HAProxy health checks)
  listen: 192.168.1.115:8008

  # Address other nodes / HAProxy will use to connect
  connect_address: 192.168.1.115:8008

etcd:
  # etcd server (DCS - Distributed Configuration Store)
  hosts: 192.168.1.111:2379,192.168.1.112:2379,192.168.1.113:2379
  cacert: /etc/etcd/ca.crt
  cert: /etc/etcd/client.crt
  key: /etc/etcd/client.key

bootstrap:
  dcs:
    # Leader key TTL in etcd (if leader dies, expires in 30s)
    ttl: 30

    # Patroni loop interval (checks cluster state every 10s)
    loop_wait: 10

    # Retry timeout for failed operations
    retry_timeout: 10

    # Max replication lag before failover (in bytes)
    maximum_lag_on_failover: 1048576

    postgresql:
      # Allows fast rewind instead of full resync after failover
      use_pg_rewind: true

      # Enable replication slots (important for HA)
      use_slots: true

      # Additional PostgreSQL parameters (empty now)
      parameters:
        synchronous_commit: "on"
        synchronous_mode: true

  # Initial database creation settings
  initdb:
    - encoding: UTF8              # Character encoding
    - data-checksums              # Enable data integrity checks

  # PostgreSQL client authentication rules
  pg_hba:
    # Local replication
    - host replication replicator 127.0.0.1/32 scram-sha-256

    # Cluster replication nodes
    - host replication replicator 192.168.1.114/32 scram-sha-256
    - host replication replicator 192.168.1.115/32 scram-sha-256
    - host replication replicator 192.168.1.116/32 scram-sha-256

    # HAProxy read/write access
    - host all all 192.168.1.117/32 scram-sha-256

  # Create initial users
  users:
    admin:
      password: admin
      options:
        - createrole   # Can create roles
        - createdb     # Can create databases

postgresql:
  # PostgreSQL listen address
  listen: 192.168.1.115:5432

  # Address used by other nodes to connect
  connect_address: 192.168.1.115:5432

  # Data directory (must exist and owned by postgres user)
  data_dir: /data/patroni

  # PostgreSQL binaries path (IMPORTANT for Patroni)
  bin_dir: /usr/lib/postgresql/18/bin

  # File storing passwords for replication
  pgpass: /tmp/pgpass

  authentication:
    replication:
      username: replicator        # Replication user
      password: admin@123

    superuser:
      username: postgres          # PostgreSQL superuser
      password: admin@123

  parameters:
    # Location for Unix socket (used by local connections)
    unix_socket_directories: '.'

    # PostgreSQL Keepalive Parameters
    tcp_keepalives_idle: 60       # Seconds before sending first keepalive probe
    tcp_keepalives_interval: 10   # Interval between keepalive probes
    tcp_keepalives_count: 5       # Number of failed probes before declaring dead

    # Backup / WAL archiving
    archive_mode: on
    archive_command: 'cp %p /backup/wal/%f'
    wal_level: replica
    max_wal_senders: 10
    wal_keep_size: 512MB

    # SSL / TLS
    ssl: on
    ssl_cert_file: '/etc/ssl/certs/server.crt'
    ssl_key_file: '/etc/ssl/private/server.key'
    ssl_ca_file: '/etc/ssl/certs/ca.crt'

tags:
  nofailover: false       # This node CAN be promoted
  noloadbalance: false    # This node CAN serve read traffic
  clonefrom: false        # Not a preferred clone source
  nosync: false           # Participate in synchronous replication
