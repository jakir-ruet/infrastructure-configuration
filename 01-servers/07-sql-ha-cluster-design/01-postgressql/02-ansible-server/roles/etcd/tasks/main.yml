---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes

- name: Install etcd packages
  ansible.builtin.apt:
    name: "{{ etcd_packages }}"
    state: present

- name: Deploy etcd environment file
  ansible.builtin.template:
    src: etcd.env.j2
    dest: /etc/default/etcd
    owner: root
    group: root
    mode: '0644'

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: yes

- name: Enable and start etcd service
  ansible.builtin.systemd:
    name: etcd
    state: started
    enabled: yes

- name: Configure UFW to allow etcd ports
  ansible.builtin.ufw:
    rule: allow
    port: "{{ item }}"
  loop: "{{ etcd_ports }}"

- name: Restrict UFW to allowed IPs
  ansible.builtin.ufw:
    rule: allow
    from_ip: "{{ item.0.ip }}"
    port: "{{ item.1 }}"
  loop: "{{ etcd_allowed_ips | subelements('ports') }}"
