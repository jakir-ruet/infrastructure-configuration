---
- name: Install common packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-psycopg2
      - python3-setuptools
      - python3-testresources
      - curl
      - gnupg
      - lsb-release
      - net-tools
    state: present
    update_cache: true

- name: Add PostgreSQL repo
  ansible.builtin.command: /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh
  args:
    creates: /etc/apt/sources.list.d/pgdg.list
  become: true

- name: Install PostgreSQL and Patroni
  ansible.builtin.apt:
    name:
      - postgresql-{{ postgres_version }}
      - postgresql-client-{{ postgres_version }}
      - postgresql-contrib-{{ postgres_version }}
      - patroni
      - etcd-client
    state: present
    update_cache: true

- name: Stop default PostgreSQL service
  ansible.builtin.systemd:
    name: postgresql
    state: stopped
    enabled: false

- name: Create Patroni data directory
  ansible.builtin.file:
    path: /data/patroni
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'

- name: Copy Patroni config
  ansible.builtin.template:
    src: patroni.yml.j2
    dest: /etc/patroni/config.yml
    mode: '0640'
    owner: postgres
    group: postgres
  notify: Restart Patroni

- name: Create Patroni systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/patroni.service
    content: |
      [Unit]
      Description=Patroni PostgreSQL HA Cluster
      After=network.target

      [Service]
      User=postgres
      Group=postgres
      ExecStart=/usr/bin/patroni /etc/patroni/config.yml
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  notify: Restart Patroni

- name: Enable and start Patroni service
  ansible.builtin.systemd:
    name: patroni
    state: started
    enabled: true
    daemon_reload: true
