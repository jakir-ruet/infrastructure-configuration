- name: Install etcd
  ansible.builtin.apt:
    name: etcd
    state: present

- name: Create etcd config
  ansible.builtin.template:
    src: etcd.conf.j2
    dest: /etc/default/etcd
    mode: '0644'

- name: Restart etcd
  ansible.builtin.systemd:
    name: etcd
    state: restarted
    enabled: true
