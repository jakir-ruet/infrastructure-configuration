- name: Install common packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - vim
      - net-tools
      - python3
    state: present
    update_cache: true

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Update /etc/hosts
  ansible.builtin.blockinfile:
    path: /etc/hosts
    block: |
      192.168.1.111 etcd1
      192.168.1.112 etcd2
      192.168.1.113 etcd3
      192.168.1.114 postgres1
      192.168.1.115 postgres2
      192.168.1.116 postgres3
      192.168.1.117 haproxy
      192.168.1.118 prometheus
      192.168.1.119 grafana
