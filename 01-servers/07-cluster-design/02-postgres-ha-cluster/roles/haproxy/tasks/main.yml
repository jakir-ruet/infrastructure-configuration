---
- name: Install HAProxy
  ansible.builtin.apt:
    name: haproxy
    state: present

- name: Configure HAProxy
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg

- name: Enable and start HAProxy
  ansible.builtin.systemd:
    name: haproxy
    enabled: yes
    state: started
