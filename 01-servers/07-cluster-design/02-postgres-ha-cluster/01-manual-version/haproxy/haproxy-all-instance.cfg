# -------------------------------
# Global settings
# -------------------------------
global
    log /dev/log    local0
    log /dev/log    local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # Default SSL locations (not used for TCP PostgreSQL)
    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

# -------------------------------
# Default settings
# -------------------------------
defaults
    log     global
    mode    tcp                # TCP mode for PostgreSQL
    option  tcplog             # Log TCP connections
    option  dontlognull
    timeout connect 4s
    timeout client 30m
    timeout server 30m

# -------------------------------
# HAProxy Stats Page
# -------------------------------
listen stats
    bind *:7000                # Stats page
    mode http
    stats enable
    stats uri /stats

# -------------------------------
# Backend for write connections (Leader / Primary)
# -------------------------------
backend postgres_primary
    mode tcp
    option httpchk GET /primary                 # Patroni health check for leader
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server postgres1 192.168.1.112:5432 check port 8008    # Leader node
    server postgres2 192.168.1.113:5432 check port 8008 backup  # Backup
    server postgres3 192.168.1.114:5432 check port 8008 backup  # Backup

# -------------------------------
# Backend for read connections (Replicas)
# -------------------------------
backend postgres_replicas
    mode tcp
    option httpchk GET /replica                # Patroni health check for streaming replicas
    http-check expect status 200
    balance roundrobin                         # Round-robin load balancing
    default-server inter 3s fall 3 rise 2
    server postgres2 192.168.1.113:5432 check port 8008
    server postgres3 192.168.1.114:5432 check port 8008

# -------------------------------
# Frontend for write connections (Leader)
# -------------------------------
frontend pg_write
    bind *:5000                     # Port for write clients
    mode tcp
    default_backend postgres_primary

# -------------------------------
# Frontend for read connections (Replicas)
# -------------------------------
frontend pg_read
    bind *:5001                     # Port for read clients
    mode tcp
    default_backend postgres_replicas
